<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FutManager">
    <meta name="theme-color" content="#0D0D1A">
    <title>FutManager</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  </head>
  <body>
    <!-- Login Screen -->
    <div id="login-screen" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; color: var(--text);">
      <div style="text-align: center;">
        <h1 style="font-size: 48px; margin-bottom: 20px;">⚽ FutManager</h1>
        <p style="color: var(--text-dim); margin-bottom: 30px;">Gerencie torneios com seus amigos</p>
        <button id="login-btn" class="btn-primary" style="width: 200px;">Entrar com Google</button>
      </div>
    </div>

    <!-- App Container -->
    <div id="app" style="display: none; width: 100%; height: 100vh; display: flex; flex-direction: column;">
      <div id="header"></div>
      <div id="main-content"></div>
      <div id="nav"></div>
      <div id="modal-overlay" style="display: none;"></div>
    </div>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
