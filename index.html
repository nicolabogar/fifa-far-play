<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FutManager">
    <meta name="theme-color" content="#0D0D1A">
    <title>FutManager</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  </head>
  <body>
    <!-- Login Screen -->
    <div id="login-screen" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg, #08080F); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; color: white;">
      <div style="text-align: center;">
        <h1 style="font-size: 48px; margin-bottom: 20px;">⚽ FutManager</h1>
        <p style="color: #aaa; margin-bottom: 30px;">Gerencie torneios com seus amigos</p>
        <button id="login-btn" style="
          background: #4285f4;
          color: white;
          border: none;
          border-radius: 8px;
          padding: 14px 28px;
          font-size: 16px;
          font-weight: 600;
          cursor: pointer;
          width: 220px;
        ">Entrar com Google</button>
      </div>
    </div>

    <!-- App Container -->
    <div id="app" style="display: none; width: 100%; height: 100vh;"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
